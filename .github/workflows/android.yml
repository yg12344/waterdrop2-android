name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip python3-dev libffi-dev libssl-dev \
          zlib1g-dev libpng-dev libjpeg-dev libopenjp2-7-dev \
          cmake unzip wget git ccache \
          autoconf automake autoconf-archive libtool libtool-bin \
          pkg-config nasm g++ zlib1g-dev gettext make m4
        
        pip install --upgrade pip setuptools wheel Cython==0.29.36
    
    - name: Install buildozer
      run: |
        pip install buildozer==1.5.0
    
    - name: Setup Android SDK
      run: |
        # GitHub Actions has pre-installed Android SDK at /usr/local/lib/android/sdk
        echo "=== Available Android SDK ==="
        ls -la /usr/local/lib/android/sdk/ 2>/dev/null || echo "SDK not found at standard location"
        
        # Create buildozer directory structure
        mkdir -p $HOME/.buildozer/android/platform
        mkdir -p $HOME/.buildozer/android/packages
        
        # Copy SDK to buildozer location (not symlink to avoid issues)
        if [ ! -d "$HOME/.buildozer/android/platform/android-sdk" ]; then
          cp -r /usr/local/lib/android/sdk $HOME/.buildozer/android/platform/android-sdk
        fi
        
        # Create tools/bin structure for buildozer compatibility
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
        
        # Create symlinks for sdkmanager and avdmanager
        ln -sf ../../cmdline-tools/latest/bin/sdkmanager $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        ln -sf ../../cmdline-tools/latest/bin/avdmanager $HOME/.buildozer/android/platform/android-sdk/tools/bin/avdmanager
        
        echo "=== Buildozer SDK structure ==="
        ls -la $HOME/.buildozer/android/platform/android-sdk/tools/bin/
        ls -la $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/
        
        # Check for NDK and link it
        NDK_DIR=$(ls /usr/local/lib/android/sdk/ndk/ | tail -1)
        echo "NDK version: $NDK_DIR"
        
        if [ ! -d "$HOME/.buildozer/android/platform/android-ndk" ]; then
          cp -r /usr/local/lib/android/sdk/ndk/$NDK_DIR $HOME/.buildozer/android/platform/android-ndk
        fi
        
        echo "=== Buildozer platform dir ==="
        ls -la $HOME/.buildozer/android/platform/
    
    - name: Update buildozer.spec
      run: |
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk
        
        # Update SDK path in buildozer.spec
        if grep -q "^android.sdk" buildozer.spec; then
          sed -i "s|android.sdk = .*|android.sdk = $ANDROID_HOME|" buildozer.spec
        else
          echo "android.sdk = $ANDROID_HOME" >> buildozer.spec
        fi
        
        # Add NDK path
        if grep -q "^android.ndk" buildozer.spec; then
          sed -i "s|android.ndk = .*|android.ndk = $ANDROID_NDK_HOME|" buildozer.spec
        else
          echo "android.ndk = $ANDROID_NDK_HOME" >> buildozer.spec
        fi
        
        # Add ndk_api
        if ! grep -q "android.ndk_api" buildozer.spec; then
          echo "android.ndk_api = 21" >> buildozer.spec
        fi
        
        echo "=== Updated buildozer.spec ==="
        cat buildozer.spec
    
    - name: Build APK
      env:
        ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
        ANDROID_NDK_HOME: /home/runner/.buildozer/android/platform/android-ndk
        JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        BUILDOZER_SDK_MANAGER: /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        ACLOCAL_FLAGS: -I/usr/share/aclocal
      run: |
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk
        export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        export BUILDOZER_SDK_MANAGER=$ANDROID_HOME/tools/bin/sdkmanager
        export ACLOCAL_FLAGS="-I/usr/share/aclocal -I/usr/share/libtool/build-aux"
        
        # Find libtool m4 macros
        echo "=== Finding libtool m4 macros ==="
        find /usr -name "ltoptions.m4" 2>/dev/null
        find /usr -name "libtool.m4" 2>/dev/null
        
        echo "=== Build Environment ==="
        echo "ANDROID_HOME=$ANDROID_HOME"
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
        echo "JAVA_HOME=$JAVA_HOME"
        echo "ACLOCAL_FLAGS=$ACLOCAL_FLAGS"
        echo "JAVA_VERSION:"
        java -version 2>&1
        
        # Verify SDK structure
        echo "=== SDK Structure ==="
        ls -la $ANDROID_HOME/
        echo "---"
        ls -la $ANDROID_HOME/tools/bin/
        echo "---"
        ls -la $ANDROID_NDK_HOME/ 2>/dev/null | head -10
        
        # Build
        buildozer android debug 2>&1
    
    - name: Find APK
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
        ls -la .buildozer/**/*.apk 2>/dev/null || echo "No APK in .buildozer"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: waterdrop2-android-apk
        path: |
          .buildozer/**/*.apk
          **/*.apk
        retention-days: 7

name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip python3-dev libffi-dev libssl-dev \
          zlib1g-dev libpng-dev libjpeg-dev libopenjp2-7-dev \
          cmake unzip wget git ccache \
          autoconf automake autoconf-archive libtool-bin pkg-config m4 gettext texinfo
        
        pip install --upgrade pip setuptools wheel Cython==0.29.36
    
    - name: Install libtool
      run: |
        sudo apt-get install -y libtool libtool-bin autoconf autoconf-archive
        echo "=== Libtool version ==="
        libtool --version
    
    - name: Check Android SDK
      run: |
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        ls -la /usr/local/lib/android/sdk/ 2>/dev/null || echo "SDK not at standard location"
        ls -la /opt/android* 2>/dev/null || echo "SDK not at /opt"
    
    - name: Setup Android SDK directories
      run: |
        # Create buildozer expected directory structure
        mkdir -p $HOME/.buildozer/android/platform
        mkdir -p $HOME/.buildozer/android/packages
        
        # Link to GitHub Actions pre-installed SDK
        if [ -d "/usr/local/lib/android/sdk" ]; then
          ln -sf /usr/local/lib/android/sdk $HOME/.buildozer/android/platform/android-sdk
          echo "Linked SDK from /usr/local/lib/android/sdk"
        elif [ -d "/opt/android-sdk" ]; then
          ln -sf /opt/android-sdk $HOME/.buildozer/android/platform/android-sdk
          echo "Linked SDK from /opt/android-sdk"
        fi
        
        # Find available NDK
        if [ -d "/usr/local/lib/android/sdk/ndk" ]; then
          NDK_DIR=$(ls -d /usr/local/lib/android/sdk/ndk/*/ 2>/dev/null | head -1 | xargs basename)
          ln -sf /usr/local/lib/android/sdk/ndk/$NDK_DIR $HOME/.buildozer/android/platform/android-ndk
          echo "Linked NDK: $NDK_DIR"
        fi
        
        ls -la $HOME/.buildozer/android/platform/
    
    - name: Install buildozer
      run: |
        pip install buildozer==1.5.0
    
    - name: Fix buildozer.spec
      run: |
        # Fix source directory - set to src
        sed -i 's|^source\.dir = .*|source.dir = src|' buildozer.spec 2>/dev/null || true
        # Fix main.py - relative to source.dir (src), so it's just main.py
        sed -i 's|^main\.py = .*|main.py = main.py|' buildozer.spec 2>/dev/null || true
        
        # Add android.ndk_api if missing
        if ! grep -q "android.ndk_api" buildozer.spec; then
          echo "android.ndk_api = 21" >> buildozer.spec
        fi
        
        cat buildozer.spec | head -50
    
    - name: Build APK
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk
        ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.3.13750724
        JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        BUILDOZER_SDK: ${{ runner.workspace }}/.buildozer
        BUILDOZER_ANDROID_NDK_VERSION: r27b
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
        export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
        export PATH=/usr/local/bin:$JAVA_HOME/bin:$PATH
        export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
        export ACLOCAL_PATH=/usr/local/share/aclocal:/usr/share/aclocal
        export ACLOCAL_FLAGS="-I /usr/local/share/aclocal -I /usr/share/aclocal"
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
        
        # Verify libtool version and m4 files
        echo "=== Libtool version ==="
        which libtool || which /usr/local/bin/libtool
        /usr/local/bin/libtool --version 2>/dev/null || libtool --version
        echo "=== ACLOCAL_PATH ==="
        echo $ACLOCAL_PATH
        echo "=== ACLOCAL_FLAGS ==="
        echo $ACLOCAL_FLAGS
        echo "=== Check libtool.m4 ==="
        ls -la /usr/local/share/aclocal/libtool.m4 2>/dev/null || echo "libtool.m4 not found in /usr/local/share/aclocal"
        ls -la /usr/share/aclocal/libtool.m4 2>/dev/null || echo "libtool.m4 not found in /usr/share/aclocal"
        echo "=== Check autoreconf ==="
        which autoreconf
        autoreconf --version | head -1
        
        # Create proper SDK symlink
        mkdir -p $HOME/.buildozer/android/platform
        mkdir -p $ANDROID_HOME/cmdline-tools
        ln -sf /usr/local/lib/android/sdk $HOME/.buildozer/android/platform/android-sdk
        
        # Link NDK if available
        if [ -d "$ANDROID_HOME/ndk" ]; then
          NDK_VER=$(ls $ANDROID_HOME/ndk/ 2>/dev/null | head -1)
          if [ -n "$NDK_VER" ]; then
            ln -sf $ANDROID_HOME/ndk/$NDK_VER $HOME/.buildozer/android/platform/android-ndk
            export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$NDK_VER
          fi
        fi
        
        # Install sdkmanager if not present
        if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p $ANDROID_HOME/cmdline-tools
          mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        fi
        
        # Create symlink for buildozer's expected sdkmanager path (tools/bin/)
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
        ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdklib.py 2>/dev/null || true
        
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        
        # Accept licenses
        yes | sdkmanager --licenses 2>/dev/null || true
        
        # Pre-clone python-for-android to add libtool.m4
        if [ ! -d "$HOME/.buildozer/android/platform/python-for-android" ]; then
          git clone -b master --single-branch https://github.com/kivy/python-for-android.git "$HOME/.buildozer/android/platform/python-for-android"
        fi
        
        # Copy libtool.m4 to p4a m4 directory
        mkdir -p $HOME/.buildozer/android/platform/python-for-android/m4
        cp /usr/share/aclocal/libtool.m4 $HOME/.buildozer/android/platform/python-for-android/m4/ 2>/dev/null || \
        cp /usr/local/share/aclocal/libtool.m4 $HOME/.buildozer/android/platform/python-for-android/m4/ 2>/dev/null || true
        
        # Update buildozer.spec with correct paths
        sed -i "s|android\.sdk = .*|android.sdk = $ANDROID_HOME|" buildozer.spec
        sed -i "s|android\.ndk = .*|android.ndk = $ANDROID_NDK_HOME|" buildozer.spec 2>/dev/null || true
        
        echo "=== Environment ==="
        echo "ANDROID_HOME=$ANDROID_HOME"
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
        echo "JAVA_HOME=$JAVA_HOME"
        
        echo "=== SDK contents ==="
        ls -la $ANDROID_HOME/
        ls -la $ANDROID_HOME/cmdline-tools/ 2>/dev/null || echo "No cmdline-tools"
        
        echo "=== Buildozer SDK ==="
        ls -la $HOME/.buildozer/android/platform/
        
        buildozer android debug --verbose 2>&1 | tail -200
    
    - name: Copy APK to workspace
      run: |
        # 查找APK并复制到bin目录
        APK_SOURCE=$(find .buildozer -name "*.apk" -type f 2>/dev/null | head -1)
        if [ -n "$APK_SOURCE" ]; then
          mkdir -p bin
          cp "$APK_SOURCE" bin/
          echo "=== APK copied to bin/ ==="
          ls -la bin/
        else
          echo "ERROR: No APK found in .buildozer"
          exit 1
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: waterdrop2-apk
        path: bin/*.apk
        retention-days: 7

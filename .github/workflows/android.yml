name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip python3-dev libffi-dev libssl-dev zlib1g-dev cmake libpng-dev libjpeg-dev unzip wget git ccache openjdk-17-jdk
        pip install --upgrade pip setuptools wheel Cython==0.29.36
    
    - name: Setup Android SDK for buildozer
      run: |
        export BUILDOZER_SDK=$HOME/.buildozer/android/platform
        mkdir -p $BUILDOZER_SDK
        
        cd $BUILDOZER_SDK
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip
        
        mkdir -p android-sdk/cmdline-tools
        mv cmdline-tools android-sdk/cmdline-tools/latest 2>/dev/null || true
        mkdir -p android-sdk/cmdline-tools/latest
        mv cmdline-tools/* android-sdk/cmdline-tools/latest/ 2>/dev/null || true
        rm -rf cmdline-tools
        rm -f cmdline-tools.zip
        
        mkdir -p android-sdk/licenses
        printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n" > android-sdk/licenses/android-sdk-license
        printf "\n84831b9409646a918e30573bab4c9c91346d8abd\n" > android-sdk/licenses/android-sdk-preview-license
        
        export PATH=$BUILDOZER_SDK/android-sdk/cmdline-tools/latest/bin:$PATH
        
        yes | sdkmanager --sdk_root=$BUILDOZER_SDK/android-sdk "platform-tools" || true
        yes | sdkmanager --sdk_root=$BUILDOZER_SDK/android-sdk "platforms;android-33" || true
        yes | sdkmanager --sdk_root=$BUILDOZER_SDK/android-sdk "build-tools;33.0.2" || true
        
        ls -la $BUILDOZER_SDK/android-sdk/cmdline-tools/latest/bin/
        
        echo "ANDROID_HOME=$BUILDOZER_SDK/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$BUILDOZER_SDK/android-ndk-r25b" >> $GITHUB_ENV
        echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
    
    - name: Install buildozer
      run: |
        pip install buildozer==1.5.0
    
    - name: Fix buildozer.spec
      run: |
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        sed -i 's|^source\.dir = .*|source.dir = ./src|' buildozer.spec
        sed -i "s|android\.sdk = .*|android.sdk = $ANDROID_HOME|" buildozer.spec
    
    - name: Build APK
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
      run: |
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
        buildozer android debug 2>&1
    
    - name: Find APK
      run: |
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: waterdrop2-apk
        path: .buildozer/**/*.apk
        retention-days: 7

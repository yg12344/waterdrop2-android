name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          libffi-dev \
          libssl-dev \
          zlib1g-dev \
          cmake \
          libpng-dev \
          libjpeg-dev \
          unzip \
          wget
        sudo apt-get install -y openjdk-17-jdk-headless
    
    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mkdir -p latest
        mv cmdline-tools/* latest/ 2>/dev/null || true
        rm -rf cmdline-tools
        mv latest cmdline-tools
        rm cmdline-tools.zip
        export ANDROID_HOME=$HOME/android-sdk
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.1.8937393"
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$HOME/android-sdk/ndk/25.1.8937393" >> $GITHUB_ENV
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install buildozer==1.5.0
    
    - name: Update buildozer.spec
      run: |
        sed -i 's|source\.dir = \.|source.dir = ./src|' buildozer.spec
        sed -i "s|android\.sdk = .*|android.sdk = $HOME/android-sdk|" buildozer.spec
        sed -i "s|android\.ndk = .*|android.ndk = $HOME/android-sdk/ndk/25.1.8937393|" buildozer.spec
    
    - name: Build Debug APK
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_NDK_HOME=$HOME/android-sdk/ndk/25.1.8937393
        buildozer android debug 2>&1 | tail -100
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: waterdrop2-apk
        path: .buildozer/android/platform/build/*/build/outputs/apk/debug/*.apk
        retention-days: 7

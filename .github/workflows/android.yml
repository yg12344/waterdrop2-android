name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          python3-dev \
          libffi-dev \
          libssl-dev \
          zlib1g-dev \
          cmake \
          libpng-dev \
          libjpeg-dev \
          unzip \
          wget \
          git \
          ccache \
          openjdk-17-jdk
        pip install --upgrade pip setuptools wheel
    
    - name: Setup Android SDK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME
        cd $ANDROID_HOME
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/bin cmdline-tools/latest/
        mv cmdline-tools/lib cmdline-tools/latest/
        mv cmdline-tools/NOTICE.txt cmdline-tools/latest/ 2>/dev/null || true
        mv cmdline-tools/source.properties cmdline-tools/latest/ 2>/dev/null || true
        rm -f cmdline-tools.zip
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.1.8937393"
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.1.8937393" >> $GITHUB_ENV
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel Cython==0.29.36
        pip install buildozer==1.5.0
        pip install python-for-android
    
    - name: Fix buildozer.spec
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        sed -i 's|^source\.dir = .*|source.dir = ./src|' buildozer.spec
        sed -i "s|android\.sdk = .*|android.sdk = $ANDROID_HOME|" buildozer.spec
        sed -i "s|android\.ndk = .*|android.ndk = $ANDROID_HOME/ndk/25.1.8937393|" buildozer.spec
    
    - name: Build APK
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        buildozer android debug 2>&1
    
    - name: Find APK
      run: |
        echo "=== APK Files ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: waterdrop2-apk
        path: .buildozer/**/*.apk
        retention-days: 7

name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip python3-dev libssl-dev \
          zlib1g-dev libpng-dev libjpeg-dev libopenjp2-7-dev \
          cmake unzip wget git ccache \
          autoconf automake autoconf-archive libtool libtool-bin \
          pkg-config nasm g++ zlib1g-dev gettext make m4 texinfo
        
        pip install --upgrade pip setuptools wheel Cython==0.29.36
        
        # Install libtool 2.4.7 from source (has LT_SYS_SYMBOL_USCORE macro)
        cd /tmp
        wget -q https://ftp.gnu.org/gnu/libtool/libtool-2.4.7.tar.gz
        tar -xzf libtool-2.4.7.tar.gz
        cd libtool-2.4.7
        ./configure --prefix=/usr/local
        make -j$(nproc)
        sudo make install
        sudo ldconfig
        
        # Update paths
        export PATH=/usr/local/bin:$PATH
        export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
        export LIBRARY_PATH=/usr/local/lib
        
        echo "=== Libtool version after install ==="
        /usr/local/bin/libtoolize --version 2>&1 || true
        /usr/local/bin/libtool --version 2>&1 || true
        
        # Copy m4 files to aclocal
        sudo cp /usr/local/share/aclocal/*.m4 /usr/share/aclocal/ 2>/dev/null || true
        sudo cp /usr/local/share/aclocal/*.m4 /tmp/aclocal/ 2>/dev/null || true
        
        echo "=== Checking for LT_SYS_SYMBOL_USCORE ==="
        grep -l "LT_SYS_SYMBOL_USCORE" /usr/share/aclocal/*.m4 /usr/local/share/aclocal/*.m4 2>/dev/null || echo "Macro not found"
    
    - name: Install buildozer
      run: |
        pip install buildozer==1.4.0
    
    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/.buildozer/android/platform
        mkdir -p $HOME/.buildozer/android/packages
        
        # Copy SDK
        if [ ! -d "$HOME/.buildozer/android/platform/android-sdk" ]; then
          cp -r /usr/local/lib/android/sdk $HOME/.buildozer/android/platform/android-sdk
        fi
        
        # Create tools/bin structure
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
        ln -sf ../../cmdline-tools/latest/bin/sdkmanager $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        ln -sf ../../cmdline-tools/latest/bin/avdmanager $HOME/.buildozer/android/platform/android-sdk/tools/bin/avdmanager
        
        # Copy NDK
        NDK_DIR=$(ls /usr/local/lib/android/sdk/ndk/ | tail -1)
        if [ ! -d "$HOME/.buildozer/android/platform/android-ndk" ]; then
          cp -r /usr/local/lib/android/sdk/ndk/$NDK_DIR $HOME/.buildozer/android/platform/android-ndk
        fi
        
        echo "=== SDK Setup Complete ==="
    
    - name: Update buildozer.spec
      run: |
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk
        
        # Configure buildozer.spec
        if grep -q "^android.sdk" buildozer.spec; then
          sed -i "s|android.sdk = .*|android.sdk = $ANDROID_HOME|" buildozer.spec
        else
          echo "android.sdk = $ANDROID_HOME" >> buildozer.spec
        fi
        
        if grep -q "^android.ndk" buildozer.spec; then
          sed -i "s|android.ndk = .*|android.ndk = $ANDROID_NDK_HOME|" buildozer.spec
        else
          echo "android.ndk = $ANDROID_NDK_HOME" >> buildozer.spec
        fi
        
        if ! grep -q "android.ndk_api" buildozer.spec; then
          echo "android.ndk_api = 21" >> buildozer.spec
        fi
        
        # Use only arm64-v8a architecture
        sed -i 's|android.archs = .*|android.archs = arm64-v8a|' buildozer.spec
        
        cat buildozer.spec
    
    - name: Build APK
      env:
        ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
        ANDROID_NDK_HOME: /home/runner/.buildozer/android/platform/android-ndk
        JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        BUILDOZER_SDK_MANAGER: /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        ACLOCAL_PATH: /usr/share/aclocal:/tmp/aclocal:/usr/local/share/aclocal
        PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:/usr/local/lib/pkgconfig
        LT_SYS_LIBRARY_PATH: /usr/lib
        LD_LIBRARY_PATH: /usr/local/lib
        LIBRARY_PATH: /usr/local/lib
      run: |
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk
        export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
        export PATH=/usr/local/bin:$JAVA_HOME/bin:$PATH
        export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
        export LIBRARY_PATH=/usr/local/lib:$LIBRARY_PATH
        export BUILDOZER_SDK_MANAGER=$ANDROID_HOME/tools/bin/sdkmanager
        export ACLOCAL_PATH=/usr/share/aclocal:/tmp/aclocal:/usr/local/share/aclocal
        export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:/usr/local/lib/pkgconfig
        export PYTHONPATH=/tmp/p4a-recipes
        
        # Copy m4 files from local libtool install
        sudo cp /usr/local/share/aclocal/*.m4 /usr/share/aclocal/ 2>/dev/null || true
        
        echo "=== Libtool version ==="
        which libtoolize
        which libtool
        libtoolize --version 2>&1 | head -1
        libtool --version 2>&1 | head -1
        
        echo "=== Build Environment ==="
        java -version 2>&1
        echo "ACLOCAL_PATH=$ACLOCAL_PATH"
        
        # List m4 files with LT_SYS_SYMBOL_USCORE
        echo "=== M4 files with LT_SYS_SYMBOL_USCORE ==="
        grep -l "LT_SYS_SYMBOL_USCORE" /usr/share/aclocal/*.m4 /usr/local/share/aclocal/*.m4 2>/dev/null || echo "Not found"
        
        # Build
        buildozer android debug 2>&1 | tee build.log
    
    - name: Analyze build log
      if: failure()
      run: |
        echo "=== Last 100 lines of build.log ==="
        tail -100 build.log 2>/dev/null || echo "No build.log found"
    
    - name: Find APK
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
        ls -la .bin/*.apk 2>/dev/null || echo "No APK in .bin"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: waterdrop2-android-apk
        path: |
          .bin/*.apk
          .buildozer/**/*.apk
          **/*.apk
        retention-days: 7

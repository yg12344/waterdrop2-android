name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          libffi-dev \
          libssl-dev \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libpng-dev \
          libjpeg-dev \
          libopenjdk-11-jdk \
          unzip
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0
    
    - name: Prepare Android SDK
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk
        cd ~/.buildozer/android/platform/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        rm cmdline-tools.zip
        
        export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        
        yes | sdkmanager --licenses 2>/dev/null || true
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" 2>/dev/null || true
    
    - name: Update buildozer.spec for CI
      run: |
        # Configure buildozer for CI environment
        sed -i 's|android.sdk = .*|android.sdk = ~/.buildozer/android/platform/android-sdk|' buildozer.spec
        sed -i 's|android.ndk = .*|android.ndk = ~/.buildozer/android/platform/android-ndk|' buildozer.spec
    
    - name: Build Debug APK
      env:
        ANDROID_HOME: ~/.buildozer/android/platform/android-sdk
        ANDROID_NDK_HOME: ~/.buildozer/android/platform/android-ndk
      run: |
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        
        # Pre-download dependencies
        buildozer android debug --verbose 2>&1 || buildozer android debug 2>&1
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: waterdrop2-apk
        path: ./.bin/*.apk
        retention-days: 7
    
    - name: Display APK info
      run: |
        ls -lh .bin/ 2>/dev/null || echo "Checking for APK..."
        find . -name "*.apk" -type f 2>/dev/null || echo "APK not found"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: waterdrop2-apk
        path: ./apk
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./apk/*.apk
        tag_name: v1.0.0
        release_name: Waterdrop2 Android APK v1.0.0
        body: |
          ## 水滴2机器人控制台 Android APK
          
          ### 功能特性
          - 🔗 网络连接 - TCP/IP连接机器人底盘
          - 🎮 遥控控制 - 虚拟摇杆直接控制
          - 📍 导航功能 - 坐标和Marker导航
          - ⚡ 急停控制 - 一键紧急停止
          - 💡 灯光控制 - RGB灯带调节
          
          ### 安装说明
          1. 下载APK文件
          2. 传输到Android手机
          3. 启用"未知来源"安装
          4. 安装并运行
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

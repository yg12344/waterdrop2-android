name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'main.py'
      - 'waterdrop2_client.py'
      - 'buildozer.spec'
      - 'assets/**'
      - 'src/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Show project structure
      run: |
        echo "=== Project root ==="
        ls -la
        echo "=== assets/ ==="
        ls -la assets/ 2>/dev/null || echo "assets/ not found!"
        echo "=== src/ ==="
        ls -la src/ 2>/dev/null || echo "src/ not found"

    - name: Verify required assets exist
      run: |
        test -f assets/sd_icon.png     || (echo "ERROR: assets/sd_icon.png not found!" && exit 1)
        test -f assets/sd_presplash.png || (echo "ERROR: assets/sd_presplash.png not found!" && exit 1)
        echo "Assets OK"

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git zip unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev automake

    - name: Install buildozer and cython
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.36

    - name: Accept Android SDK licenses and install build-tools
      run: |
        # 找到系统 sdkmanager（GitHub Actions 自带 Android SDK）
        SDKMANAGER=""
        for dir in \
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
          /usr/local/lib/android/sdk/tools/bin/sdkmanager \
          ~/android-sdk/cmdline-tools/latest/bin/sdkmanager; do
          if [ -f "$dir" ]; then
            SDKMANAGER="$dir"
            break
          fi
        done

        if [ -z "$SDKMANAGER" ]; then
          echo "ERROR: sdkmanager not found!"
          echo "Available cmdline-tools:"
          find /usr/local/lib/android/sdk -name "sdkmanager" 2>/dev/null | head -5
          ls -la /usr/local/lib/android/sdk/ 2>/dev/null | head -20
          exit 1
        fi

        echo "Using sdkmanager: $SDKMANAGER"
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        export ANDROID_HOME=/usr/local/lib/android/sdk

        # 接受所有许可证
        yes | $SDKMANAGER --licenses 2>&1 | tail -5

        # 安装所需的 build-tools 版本
        $SDKMANAGER "build-tools;37.0.0" 2>&1 | tail -10

        echo "=== SDK build-tools ==="
        ls /usr/local/lib/android/sdk/build-tools/ 2>/dev/null || echo "not found"
        echo "=== SDK platforms ==="
        ls /usr/local/lib/android/sdk/platforms/ 2>/dev/null || echo "not found"

    - name: Cache buildozer global dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: ${{ runner.os }}-buildozer-ndk25b-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-ndk25b-
          ${{ runner.os }}-buildozer-

    - name: Build APK
      env:
        # 只清除 NDK 相关变量，防止路径冲突（这是上次踩的坑）
        # BUILDOZER_SDK 指向系统 SDK，系统 SDK 已有许可证，避免 buildozer 创建自己的空 SDK
        ANDROID_NDK_HOME: ""
        ANDROID_NDK_VERSION: ""
        ANDROID_NDK: ""
        ANDROIDNDK: ""
        ANDROID_NDK_ROOT: ""
        BUILDOZER_SDK: "/usr/local/lib/android/sdk"
      run: |
        unset ANDROID_NDK_HOME ANDROID_NDK_VERSION ANDROID_NDK ANDROIDNDK ANDROID_NDK_ROOT
        export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"

        # ===== 清除 buildozer 缓存的 NDK 符号链接 =====
        # buildozer 会创建 ~/.buildozer/android/platform/android-ndk -> runner NDK r27 的符号链接
        # 当它读到该链接指向的路径时，会从中提取版本号，拼出错误的下载 URL：
        #   android-ndk-r/usr/local/lib/android/sdk/ndk/27.3.13750724-linux.zip
        # 解决方案：在 buildozer 运行前删除这个符号链接，迫使其重新下载 NDK r25b
        echo "=== 清除 buildozer NDK 符号链接 ==="
        rm -rf ~/.buildozer/android/platform/android-ndk
        rm -rf ~/.buildozer/android/platform/android-sdk
        echo "符号链接已清除"

        buildozer -v android debug 2>&1 | tee buildozer.log
      timeout-minutes: 60

    - name: Show build result
      if: always()
      run: |
        echo "=== bin/ contents ==="
        ls -la bin/ 2>/dev/null || echo "bin/ not found or empty"
        echo ""
        echo "=== Last 100 lines of buildozer.log ==="
        tail -100 buildozer.log 2>/dev/null || echo "No buildozer.log"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: waterdrop2-apk-${{ github.run_number }}
        path: bin/*.apk
        if-no-files-found: error

    - name: Upload build log on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs-${{ github.run_number }}
        path: |
          buildozer.log
        if-no-files-found: ignore

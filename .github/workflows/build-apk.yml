name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'main.py'
      - 'waterdrop2_client.py'
      - 'buildozer.spec'
      - 'assets/**'
      - 'src/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Show project structure
      run: |
        echo "=== Project root ==="
        ls -la
        echo "=== assets/ ==="
        ls -la assets/ 2>/dev/null || echo "assets/ not found!"
        echo "=== src/ ==="
        ls -la src/ 2>/dev/null || echo "src/ not found"

    - name: Verify required assets exist
      run: |
        test -f assets/sd_icon.png     || (echo "ERROR: assets/sd_icon.png not found!" && exit 1)
        test -f assets/sd_presplash.png || (echo "ERROR: assets/sd_presplash.png not found!" && exit 1)
        echo "Assets OK"

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git zip unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev automake

    - name: Install buildozer and cython
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.36

    - name: Build APK
      env:
        # 清除 NDK 相关变量，防止路径冲突
        ANDROID_NDK_HOME: ""
        ANDROID_NDK_VERSION: ""
        ANDROID_NDK: ""
        ANDROIDNDK: ""
        ANDROID_NDK_ROOT: ""
        JAVA_HOME: "/usr/lib/jvm/temurin-17-jdk-amd64"
        # BUILDOZER_SDK 不设，让 buildozer 用 ~/.buildozer（默认行为）
        ANDROID_HOME: "/usr/local/lib/android/sdk"
      run: |
        unset ANDROID_NDK_HOME ANDROID_NDK_VERSION ANDROID_NDK ANDROIDNDK ANDROID_NDK_ROOT
        export PATH="$JAVA_HOME/bin:$PATH"

        # buildozer 实际使用 ~/.buildozer（home目录），不是 workspace .buildozer
        # 准备 home 目录下的 SDK：licenses + build-tools + tools/bin/sdkmanager
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
        mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin

        # 接受许可证并安装 build-tools（用系统 sdkmanager）
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 | tail -3
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;37.0.0" 2>&1 | tail -3

        # 复制 licenses 和 build-tools（实体文件，用 cp -rL）
        cp -rL $ANDROID_HOME/licenses/* ~/.buildozer/android/platform/android-sdk/licenses/
        cp -rL $ANDROID_HOME/build-tools/37.0.0 ~/.buildozer/android/platform/android-sdk/build-tools/

        # cmdline-tools 和 tools/bin/sdkmanager 用符号链接（避免 cp 复制二进制问题）
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        ln -sf $ANDROID_HOME/cmdline-tools/latest ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
        ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

        # 验证
        echo "=== buildozer SDK ==="
        ls ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager && echo "sdkmanager OK" || echo "sdkmanager MISSING"
        ls ~/.buildozer/android/platform/android-sdk/build-tools/ && echo "build-tools OK" || echo "build-tools MISSING"
        ls ~/.buildozer/android/platform/android-sdk/licenses/ && echo "licenses OK" || echo "licenses MISSING"
        echo "=== Java version ==="
        java -version 2>&1
        echo "=== CWD ==="
        pwd

        buildozer -v android debug 2>&1 | tee buildozer.log
      timeout-minutes: 60

    - name: Show build result
      if: always()
      run: |
        echo "=== Workspace bin/ ==="
        ls -la bin/ 2>/dev/null || echo "bin/ not found or empty"
        echo ""
        echo "=== buildozer SDK tools/bin/ ==="
        ls -la ~/.buildozer/android/platform/android-sdk/tools/bin/ 2>/dev/null || echo "tools/bin/ not found"
        echo ""
        echo "=== buildozer SDK cmdline-tools/bin/ ==="
        ls -la ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/ 2>/dev/null || echo "cmdline-tools bin/ not found"
        echo ""
        echo "=== buildozer SDK build-tools/ ==="
        ls ~/.buildozer/android/platform/android-sdk/build-tools/ 2>/dev/null || echo "build-tools not found"
        echo ""
        echo "=== sdkmanager test ==="
        ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --version 2>&1 || echo "sdkmanager FAILED"
        ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --version 2>&1 || echo "cmdline-tools sdkmanager FAILED"
        echo ""
        echo "=== Last 200 lines of buildozer.log ==="
        tail -200 buildozer.log 2>/dev/null || echo "No buildozer.log"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: waterdrop2-apk-${{ github.run_number }}
        path: bin/*.apk
        if-no-files-found: error

    - name: Upload build log on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs-${{ github.run_number }}
        path: |
          buildozer.log
        if-no-files-found: ignore

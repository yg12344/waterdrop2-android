name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'main.py'
      - 'waterdrop2_client.py'
      - 'buildozer.spec'
      - 'assets/**'
      - 'src/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Show project structure
      run: |
        echo "=== Project root ==="
        ls -la
        echo "=== assets/ ==="
        ls -la assets/ 2>/dev/null || echo "assets/ not found!"
        echo "=== src/ ==="
        ls -la src/ 2>/dev/null || echo "src/ not found"

    - name: Verify required assets exist
      run: |
        test -f assets/sd_icon.png     || (echo "ERROR: assets/sd_icon.png not found!" && exit 1)
        test -f assets/sd_presplash.png || (echo "ERROR: assets/sd_presplash.png not found!" && exit 1)
        echo "Assets OK"

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git zip unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev automake

    - name: Install buildozer and cython
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.36

    - name: Accept Android SDK licenses and install build-tools
      run: |
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        export ANDROID_HOME=/usr/local/lib/android/sdk
        SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"

        echo "Using sdkmanager: $SDKMANAGER"

        # 接受所有许可证
        yes | $SDKMANAGER --licenses 2>&1 | tail -5

        # 安装所需的 build-tools 版本
        $SDKMANAGER "build-tools;37.0.0" 2>&1 | tail -10

        echo "=== SDK build-tools ==="
        ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "not found"

    - name: Build APK
      env:
        # 清除 NDK 相关变量，防止路径冲突
        ANDROID_NDK_HOME: ""
        ANDROID_NDK_VERSION: ""
        ANDROID_NDK: ""
        ANDROIDNDK: ""
        ANDROID_NDK_ROOT: ""
        # 显式指定 Java 17（openjdk-17-jdk）
        JAVA_HOME: "/usr/lib/jvm/temurin-17-jdk-amd64"
        BUILDOZER_SDK: "/usr/local/lib/android/sdk"
        ANDROID_HOME: "/usr/local/lib/android/sdk"
      run: |
        unset ANDROID_NDK_HOME ANDROID_NDK_VERSION ANDROID_NDK ANDROIDNDK ANDROID_NDK_ROOT
        # JAVA_HOME 由 step env 传入，不要 unset
        # 必须把 Java 17 放在 PATH 最前面，否则 buildozer 会找到 runner 的 Java 11
        export PATH="$JAVA_HOME/bin:$PATH"

        # 只清除 NDK 残留，不动 android-sdk（里面有我们刚准备好的 sdkmanager 和 build-tools）
        rm -rf ~/.buildozer/android/platform/android-ndk

        # 确保 android-sdk 目录完整（万一首次构建没有前面的步骤）
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
        mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
        cp -r $ANDROID_HOME/licenses/* ~/.buildozer/android/platform/android-sdk/licenses/ 2>/dev/null || true
        cp -r $ANDROID_HOME/build-tools/37.0.0 ~/.buildozer/android/platform/android-sdk/build-tools/ 2>/dev/null || true
        cp -r $ANDROID_HOME/cmdline-tools/latest/bin/* ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/ 2>/dev/null || true
        ln -sf ../cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        echo "=== buildozer SDK ready ==="
        ls ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager 2>/dev/null && echo "sdkmanager OK" || echo "sdkmanager MISSING"
        echo "=== Java version ==="
        $JAVA_HOME/bin/java -version 2>&1 || echo "Java check failed"

        buildozer -v android debug 2>&1 | tee buildozer.log
      timeout-minutes: 60

    - name: Show build result
      if: always()
      run: |
        echo "=== bin/ contents ==="
        ls -la bin/ 2>/dev/null || echo "bin/ not found or empty"
        echo ""
        echo "=== Last 100 lines of buildozer.log ==="
        tail -100 buildozer.log 2>/dev/null || echo "No buildozer.log"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: waterdrop2-apk-${{ github.run_number }}
        path: bin/*.apk
        if-no-files-found: error

    - name: Upload build log on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs-${{ github.run_number }}
        path: |
          buildozer.log
        if-no-files-found: ignore

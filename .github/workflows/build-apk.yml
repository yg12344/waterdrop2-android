name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'main.py'
      - 'waterdrop2_client.py'
      - 'buildozer.spec'
      - 'assets/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev \
          automake

    - name: Install buildozer
      run: |
        pip install buildozer cython

    - name: Cache buildozer dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Build APK
      run: |
        buildozer android debug 2>&1 | tee buildozer.log
      timeout-minutes: 45

    - name: List bin directory
      if: always()
      run: |
        ls -la bin/ 2>/dev/null || echo "bin directory not found or empty"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: waterdrop2-apk
        path: bin/*.apk
        if-no-files-found: warn

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          buildozer.log
          .buildozer/android/platform/build-*/build.log
          .buildozer/android/platform/build-*/logs/
        if-no-files-found: ignore

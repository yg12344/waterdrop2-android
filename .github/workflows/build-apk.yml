name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'main.py'
      - 'waterdrop2_client.py'
      - 'buildozer.spec'
      - 'assets/**'
      - 'src/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Show project structure
      run: |
        echo "=== Project root ==="
        ls -la
        echo "=== assets/ ==="
        ls -la assets/ 2>/dev/null || echo "assets/ not found!"
        echo "=== src/ ==="
        ls -la src/ 2>/dev/null || echo "src/ not found"

    - name: Verify required assets exist
      run: |
        test -f assets/sd_icon.png     || (echo "ERROR: assets/sd_icon.png not found!" && exit 1)
        test -f assets/sd_presplash.png || (echo "ERROR: assets/sd_presplash.png not found!" && exit 1)
        echo "Assets OK"

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git zip unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev automake

    - name: Install buildozer and cython
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.36

    - name: Build APK
      env:
        # 清除 NDK 相关变量，防止路径冲突
        ANDROID_NDK_HOME: ""
        ANDROID_NDK_VERSION: ""
        ANDROID_NDK: ""
        ANDROIDNDK: ""
        ANDROID_NDK_ROOT: ""
        JAVA_HOME: "/usr/lib/jvm/temurin-17-jdk-amd64"
        ANDROID_HOME: "/usr/local/lib/android/sdk"
      run: |
        unset ANDROID_NDK_HOME ANDROID_NDK_VERSION ANDROID_NDK ANDROIDNDK ANDROID_NDK_ROOT
        export PATH="$JAVA_HOME/bin:$PATH"

        # 验证系统 SDK 中 sdkmanager 可用
        echo "=== System sdkmanager ==="
        ls -la $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --version

        # p4a 硬编码检查 tools/bin/sdkmanager，创建符号链接指向正确位置
        mkdir -p $ANDROID_HOME/tools/bin
        ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
        echo "=== sdkmanager symlink ==="
        ls -la $ANDROID_HOME/tools/bin/sdkmanager

        # 接受所有 Android SDK licenses（build-tools 等所需）
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 | tail -5
        # 确保 build-tools 37.0.0 已安装
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;37.0.0" 2>&1 | tail -5

        echo "=== Java version ==="
        java -version 2>&1
        echo "=== SDK build-tools ==="
        ls $ANDROID_HOME/build-tools/ 2>&1

        buildozer -v android debug 2>&1 | tee buildozer.log
      timeout-minutes: 60

    - name: Show build result
      if: always()
      run: |
        echo "=== Workspace bin/ ==="
        ls -la bin/ 2>/dev/null || echo "bin/ not found or empty"
        echo ""
        echo "=== Last 200 lines of buildozer.log ==="
        tail -200 buildozer.log 2>/dev/null || echo "No buildozer.log"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: waterdrop2-apk-${{ github.run_number }}
        path: bin/*.apk
        if-no-files-found: error

    - name: Upload build log on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs-${{ github.run_number }}
        path: |
          buildozer.log
        if-no-files-found: ignore
